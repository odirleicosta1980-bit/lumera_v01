services:
  - type: web
    name: lumera-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm install --no-frozen-lockfile --prod=false && pnpm db:generate && pnpm --filter @lumera/api build
    startCommand: corepack enable && corepack prepare pnpm@10.0.0 --activate && pnpm --filter @lumera/api prisma:migrate:deploy && pnpm --filter @lumera/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PORT
        value: 10000
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
